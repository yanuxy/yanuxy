<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>yanuxy novel</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="container">
                <h1 id="novel-title">Memuat Judul...</h1>
                <ul>
                    <li><a href="index.html">Beranda</a></li>
                    <li><a href="#chapters">Daftar Bab</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main class="container">
        <section id="hero">
            <div class="novel-info">
                <img id="novel-cover" src="https://via.placeholder.com/200x300" alt="Cover Novel">
                <div class="novel-details">
                    <h2 id="novel-display-title">Judul Novel</h2>
                    <p id="novel-author">Penulis: Memuat...</p>
                    <p id="novel-description">Deskripsi novel akan muncul di sini...</p>
                    <div class="stats">
                        <span id="chapter-count">0 Bab</span>
                        <span id="novel-status">Status: -</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="chapters">
            <h3>Daftar Bab</h3>
            <div id="chapter-list" class="chapter-grid">
                <!-- Bab akan dimuat di sini oleh JavaScript -->
                <p>Memuat daftar bab...</p>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 <span id="footer-author">Penulis</span>. Dibuat dengan ❤️ untuk pembaca.</p>
        </div>
    </footer>

    <script src="assets/js/app.js"></script>
</body>
</html>
