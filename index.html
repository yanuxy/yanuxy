<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Digital Yanuxy</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        header { 
            background: var(--primary); 
            color: white; 
            padding: 60px 20px; 
            text-align: center; 
            border-bottom-left-radius: 50px;
            border-bottom-right-radius: 50px;
            margin-bottom: 40px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        header h1 { margin: 0; font-size: 2.5rem; letter-spacing: 1px; }
        header p { opacity: 0.9; font-size: 1.1rem; margin-top: 10px; }

        /* Search & Filter */
        .controls { text-align: center; margin-bottom: 40px; }
        .search-bar {
            padding: 12px 20px;
            width: 80%;
            max-width: 500px;
            border: 2px solid #ddd;
            border-radius: 25px;
            margin-bottom: 20px;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }

        .filter-group { display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
        .filter-btn { 
            padding: 10px 20px; border: none; background: white; 
            color: var(--primary); cursor: pointer; border-radius: 20px;
            transition: 0.3s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            font-weight: 600;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--accent); color: white; }

        /* Grid Buku */
        .book-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; 
        }
        .book-card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid #eee;
        }
        .book-card:hover { transform: translateY(-10px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .book-info { padding: 25px; flex-grow: 1; }
        .category-badge { 
            font-size: 0.7rem; 
            text-transform: uppercase; 
            background: #e1f5fe; 
            color: #0288d1; 
            padding: 4px 12px; 
            border-radius: 15px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .book-info h3 { margin: 15px 0 10px 0; font-size: 1.25rem; color: #2c3e50; line-height: 1.4; }
        
        .btn-action {
            display: block;
            text-align: center;
            padding: 15px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-action:hover { background: #2980b9; }

        footer { text-align: center; padding: 60px 20px; color: #888; font-size: 0.9rem; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.8rem; }
            .search-bar { width: 90%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Perpustakaan Digital Yanuxy</h1>
    <p>Koleksi Buku Novel, Finansial, dan Programming</p>
</header>

<div class="container">
    <div class="controls">
        <input type="text" id="searchInput" class="search-bar" placeholder="Cari judul buku..." onkeyup="applyFilters()">
        
        <div class="filter-group">
            <button class="filter-btn active" onclick="filterBy('Semua', this)">Semua</button>
            <button class="filter-btn" onclick="filterBy('Novel', this)">Novel</button>
            <button class="filter-btn" onclick="filterBy('Finansial', this)">Finansial</button>
            <button class="filter-btn" onclick="filterBy('Programming', this)">Programming</button>
        </div>
    </div>

    <div id="bookGrid" class="book-grid">
        </div>
</div>

<footer>
    &copy; 2026 Perpustakaan Yanuxy. Website ini dibuat untuk tujuan edukasi.
</footer>

<script>
    /* DATABASE BUKU
       Silakan tambah buku baru di bawah ini sesuai format.
       Pastikan link Google Drive sudah diatur ke "Anyone with the link".
    */
    const databaseBuku = [
        { 
            judul: "Sistem Kekayaan 1", 
            kategori: "Novel", 
            link: "MASUKKAN_LINK_DARI_GOOGLE_DRIVE_DISINI" 
        },
        { 
            judul: "Panduan Belajar Python", 
            kategori: "Programming", 
            link: "#" 
        },
        { 
            judul: "Keuangan untuk Millennial", 
            kategori: "Finansial", 
            link: "#" 
        },
        { 
            judul: "Sang Penyihir Terakhir", 
            kategori: "Novel", 
            link: "#" 
        }
    ];

    let currentFilter = 'Semua';

    function renderBooks(booksToDisplay) {
        const grid = document.getElementById('bookGrid');
        grid.innerHTML = '';

        if (booksToDisplay.length === 0) {
            grid.innerHTML = '<p style="text-align:center; grid-column: 1/-1; padding: 40px; color: #999;">Buku tidak ditemukan...</p>';
            return;
        }

        booksToDisplay.forEach(book => {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <div class="book-info">
                    <span class="category-badge">${book.kategori}</span>
                    <h3>${book.judul}</h3>
                </div>
                <a href="${book.link}" target="_blank" class="btn-action">Baca Sekarang</a>
            `;
            grid.appendChild(card);
        });
    }

    function filterBy(kategori, btn) {
        currentFilter = kategori;
        
        // Update tampilan tombol aktif
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        applyFilters();
    }

    function applyFilters() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        
        const filtered = databaseBuku.filter(book => {
            const matchSearch = book.judul.toLowerCase().includes(searchTerm);
            const matchCategory = currentFilter === 'Semua' || book.kategori === currentFilter;
            return matchSearch && matchCategory;
        });

        renderBooks(filtered);
    }

    // Inisialisasi tampilan pertama kali
    renderBooks(databaseBuku);
</script>

</body>
</html>
